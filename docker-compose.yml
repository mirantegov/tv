# Stack por tenant. Rodar com:
#   docker compose --env-file .env.palotina -p palotina up -d --build
# O project name (-p) isola volumes/containers por entidade (app+db por tenant).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # envs do tenant lidas pelos scripts de init
      TENANT_ID: ${TENANT_ID}
      TENANT_SLUG: ${TENANT_SLUG}
      TENANT_NOME: ${TENANT_NOME}
      TENANT_UF: ${TENANT_UF}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./db/schemas:/schemas:ro
      - ./db/api:/api:ro
      - ./db/seed:/seed:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # PostgREST — API REST auto-gerada do schema `api` (só leitura, papel web_anon).
  api:
    image: postgrest/postgrest:v12.2.3
    environment:
      PGRST_DB_URI: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: api
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_SERVER_PORT: 3000
    ports:
      - "${PGRST_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      TENANT_ID: ${TENANT_ID}
      TENANT_SLUG: ${TENANT_SLUG}
      TENANT_NOME: ${TENANT_NOME}
      TENANT_UF: ${TENANT_UF}
      # URL do PostgREST acessível pelo navegador. Vazio → fallback data.ts.
      API_URL: ${API_URL:-}
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - db
      - api

volumes:
  pgdata:
